<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AtlasTrace Recorder</title>
  <style>
    body {
      margin: 0;
      width: 320px;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background: #0b1220;
      color: #e2e8f0;
    }

    .wrap {
      padding: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .brand img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: block;
    }

    h1 {
      margin: 0 0 2px;
      font-size: 16px;
      color: #00c2ff;
    }

    p {
      margin: 0 0 14px;
      font-size: 12px;
      color: #94a3b8;
    }

    .card {
      border: 1px solid #1e293b;
      background: #111827;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .status {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .status strong {
      color: #22c55e;
    }

    .buttons {
      display: grid;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px;
      color: #f8fafc;
      font-weight: 600;
      cursor: pointer;
      background: #1f2937;
    }

    button.primary {
      background: #0369a1;
    }

    button.warn {
      background: #7f1d1d;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .note {
      font-size: 11px;
      color: #64748b;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="assets/logo.svg" alt="AtlasTrace logo" />
      <h1>AtlasTrace</h1>
    </div>
    <p>Browser intelligence recorder</p>

    <div class="card">
      <div class="status">
        <span>Recording</span>
        <strong id="recordingState">No</strong>
      </div>
      <div class="status">
        <span>Captured events</span>
        <strong id="eventCount">0</strong>
      </div>
    </div>

    <div class="buttons">
      <button id="startBtn" class="primary">Start Session</button>
      <button id="stopBtn">Stop Session</button>
      <button id="exportBtn">Export Markdown</button>
      <button id="copyBtn">Copy Markdown</button>
      <button id="clearBtn" class="warn">Clear Session</button>
    </div>

    <div class="note">Tip: keep recorder on only while reproducing flow.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
